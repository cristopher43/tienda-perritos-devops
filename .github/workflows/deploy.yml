name: CI/CD Tienda Perritos

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargar el código
      uses: actions/checkout@v3

    - name: 2. Configurar Credenciales de AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    - name: 3. Login en Amazon ECR
      run: |
        aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

    - name: 4. Build y Push a ECR (Base de Datos)
      run: |
        docker build -t ${{ secrets.ECR_REPO_URL_DB }}:latest ./db
        docker push ${{ secrets.ECR_REPO_URL_DB }}:latest

    - name: 5. Build y Push a ECR (Backend)
      run: |
        docker build -t ${{ secrets.ECR_REPO_URL_BACKEND }}:latest ./backend
        docker push ${{ secrets.ECR_REPO_URL_BACKEND }}:latest

    - name: 6. Build y Push a ECR (Frontend)
      run: |
        docker build -t ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest ./frontend
        docker push ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest

    - name: 7. Desplegar Base de Datos en EC2-DB
      run: |
        aws ssm send-command \
          --instance-ids ${{ secrets.EC2_DB_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=[
            "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
            "docker pull ${{ secrets.ECR_REPO_URL_DB }}:latest",
            "docker stop tienda-db || true",
            "docker rm tienda-db || true",
            "docker run -d --name tienda-db -p 3306:3306 -v dbdata:/var/lib/mysql ${{ secrets.ECR_REPO_URL_DB }}:latest"
          ]'

    - name: 8. Desplegar Backend en EC2-Backend
      run: |
        aws ssm send-command \
          --instance-ids ${{ secrets.EC2_BACKEND_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=[
            "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
            "docker pull ${{ secrets.ECR_REPO_URL_BACKEND }}:latest",
            "docker stop tienda-backend || true",
            "docker rm tienda-backend || true",
            "docker run -d --name tienda-backend -p 3001:3001 ${{ secrets.ECR_REPO_URL_BACKEND }}:latest"
          ]'

    - name: 9. Desplegar Frontend en EC2-Frontend
      run: |
        aws ssm send-command \
          --instance-ids ${{ secrets.EC2_FRONTEND_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=[
            "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
            "docker pull ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest",
            "docker stop tienda-frontend || true",
            "docker rm tienda-frontend || true",
            "docker run -d --name tienda-frontend -p 80:80 ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest"
          ]'
